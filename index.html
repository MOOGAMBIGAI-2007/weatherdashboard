<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Dashboard</title>
    <style>
      :root {
        --bg: #07111f;
        --card: rgba(16, 30, 49, 0.92);
        --text: #f4f7fb;
        --muted: #8ea0b6;
        --accent: #4cc9f0;
        --accent-2: #4361ee;
        --danger: #ff6b6b;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", Roboto, Arial, sans-serif;
        background: linear-gradient(135deg, var(--bg), #12253d 55%, #1b3a5b);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .app {
        width: min(960px, 100%);
        background: var(--card);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 24px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.3);
        overflow: hidden;
      }

      .hero {
        padding: 28px 28px 18px;
        background: linear-gradient(90deg, rgba(76, 201, 240, 0.2), rgba(67, 97, 238, 0.2));
      }

      .hero h1 { margin: 0 0 8px; font-size: 1.8rem; }
      .hero p { margin: 0; color: var(--muted); }

      .search-bar {
        display: flex;
        gap: 12px;
        margin-top: 18px;
        flex-wrap: wrap;
      }

      .search-bar input {
        flex: 1;
        min-width: 220px;
        padding: 12px 14px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.1);
        background: rgba(255,255,255,0.08);
        color: var(--text);
        outline: none;
      }

      .search-bar button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        font-weight: 600;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        color: white;
        cursor: pointer;
      }

      .content {
        display: grid;
        grid-template-columns: 1.2fr 0.8fr;
        gap: 20px;
        padding: 24px 28px 28px;
      }

      .panel {
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 18px;
        padding: 18px;
      }

      .city-name {
        font-size: 1.4rem;
        font-weight: 700;
        margin: 0 0 6px;
      }

      .weather-main {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
      }

      .temp {
        font-size: 3rem;
        font-weight: 800;
        line-height: 1;
      }

      .summary {
        color: var(--muted);
        margin: 6px 0 0;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-top: 16px;
      }

      .metric {
        background: rgba(255,255,255,0.06);
        padding: 12px;
        border-radius: 14px;
      }

      .metric .label { color: var(--muted); font-size: 0.85rem; }
      .metric .value { font-size: 1.1rem; font-weight: 700; margin-top: 6px; }

      .status {
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(76, 201, 240, 0.12);
        color: #bfe9ff;
      }

      .status.error {
        background: rgba(255, 107, 107, 0.15);
        color: #ffd2d2;
      }

      .json-preview {
        margin-top: 12px;
        max-height: 240px;
        overflow: auto;
        padding-right: 6px;
      }

      .json-preview ul { margin: 0; padding-left: 18px; }
      .json-preview li { margin: 4px 0; color: #d7e4f3; }

      @media (max-width: 760px) {
        .content { grid-template-columns: 1fr; }
        .metrics { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="hero">
        <h1>Live Weather Dashboard</h1>
        <p>Search any city and view live weather data fetched from a public REST API.</p>
        <div class="search-bar">
          <input id="cityInput" type="text" placeholder="Type a city name..." value="Chennai" />
          <button id="searchBtn">Get Weather</button>
        </div>
      </section>

      <section class="content">
        <div class="panel">
          <h2 id="cityName" class="city-name">Loading...</h2>
          <div class="weather-main">
            <div>
              <div id="temperature" class="temp">--°C</div>
              <p id="summary" class="summary">Fetching latest weather...</p>
            </div>
            <div id="weatherIcon">☁️</div>
          </div>
          <div class="metrics">
            <div class="metric">
              <div class="label">Humidity</div>
              <div id="humidity" class="value">--%</div>
            </div>
            <div class="metric">
              <div class="label">Wind Speed</div>
              <div id="windSpeed" class="value">-- km/h</div>
            </div>
            <div class="metric">
              <div class="label">Timezone</div>
              <div id="timezone" class="value">--</div>
            </div>
          </div>
          <div id="status" class="status">Requesting weather data...</div>
        </div>

        <div class="panel">
          <h3>API Response Preview</h3>
          <div id="jsonPreview" class="json-preview"></div>
        </div>
      </section>
    </main>

    <script>
      const cityInput = document.getElementById('cityInput');
      const searchBtn = document.getElementById('searchBtn');
      const cityName = document.getElementById('cityName');
      const temperature = document.getElementById('temperature');
      const summary = document.getElementById('summary');
      const humidity = document.getElementById('humidity');
      const windSpeed = document.getElementById('windSpeed');
      const timezone = document.getElementById('timezone');
      const weatherIcon = document.getElementById('weatherIcon');
      const status = document.getElementById('status');
      const jsonPreview = document.getElementById('jsonPreview');

      const weatherCodeMap = {
        0: 'Clear sky',
        1: 'Mainly clear',
        2: 'Partly cloudy',
        3: 'Overcast',
        45: 'Fog',
        48: 'Rime fog',
        51: 'Light drizzle',
        53: 'Moderate drizzle',
        55: 'Dense drizzle',
        61: 'Slight rain',
        63: 'Moderate rain',
        65: 'Heavy rain',
        71: 'Slight snow',
        73: 'Moderate snow',
        75: 'Heavy snow',
        95: 'Thunderstorm',
        96: 'Thunderstorm with hail',
        99: 'Thunderstorm with heavy hail'
      };

      function setStatus(message, isError = false) {
        status.textContent = message;
        status.className = `status${isError ? ' error' : ''}`;
      }

      function renderJsonPreview(data, container, depth = 0) {
        if (Array.isArray(data)) {
          const list = document.createElement('ul');
          data.slice(0, 8).forEach((item) => {
            const li = document.createElement('li');
            li.textContent = typeof item === 'object' && item !== null ? '[object]' : String(item);
            list.appendChild(li);
          });
          container.appendChild(list);
          return;
        }

        if (data && typeof data === 'object') {
          const list = document.createElement('ul');
          Object.entries(data).slice(0, 10).forEach(([key, value]) => {
            const li = document.createElement('li');
            if (value && typeof value === 'object') {
              li.innerHTML = `<strong>${key}</strong>: ${Array.isArray(value) ? '[array]' : '[object]'}`;
              renderJsonPreview(value, li, depth + 1);
            } else {
              li.innerHTML = `<strong>${key}</strong>: ${String(value)}`;
            }
            list.appendChild(li);
          });
          container.appendChild(list);
        } else {
          container.textContent = String(data);
        }
      }

      async function getWeather(city) {
        const trimmedCity = city.trim();
        if (!trimmedCity) {
          setStatus('Please enter a city name first.', true);
          return;
        }

        setStatus('Requesting weather data...');
        cityName.textContent = 'Loading...';
        temperature.textContent = '--°C';
        summary.textContent = 'Fetching latest weather...';
        humidity.textContent = '--%';
        windSpeed.textContent = '-- km/h';
        timezone.textContent = '--';
        weatherIcon.textContent = '🌤️';
        jsonPreview.innerHTML = '';

        try {
          const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(trimmedCity)}&count=1&language=en&format=json`;
          const geoResponse = await fetch(geoUrl);

          if (!geoResponse.ok) {
            throw new Error('City lookup failed. Please try another place.');
          }

          const geoData = await geoResponse.json();
          const location = geoData.results?.[0];

          if (!location) {
            throw new Error(`No results found for “${trimmedCity}”.`);
          }

          const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${location.latitude}&longitude=${location.longitude}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code&timezone=auto`;
          const weatherResponse = await fetch(weatherUrl);

          if (!weatherResponse.ok) {
            throw new Error('Weather service error. Try again shortly.');
          }

          const weatherData = await weatherResponse.json();
          const current = weatherData.current;
          const weatherCode = current?.weather_code;
          const conditionText = weatherCodeMap[weatherCode] || 'Weather update';

          cityName.textContent = `${location.name}${location.country ? `, ${location.country}` : ''}`;
          temperature.textContent = `${Math.round(current?.temperature_2m ?? 0)}°C`;
          summary.textContent = `${conditionText} • Updated live`;
          humidity.textContent = `${current?.relative_humidity_2m ?? 0}%`;
          windSpeed.textContent = `${Math.round(current?.wind_speed_10m ?? 0)} km/h`;
          timezone.textContent = weatherData.timezone || '--';
          weatherIcon.textContent = weatherCode >= 95 ? '⛈️' : weatherCode >= 61 ? '🌧️' : weatherCode >= 45 ? '🌫️' : weatherCode >= 3 ? '☁️' : '☀️';

          setStatus(`Live weather loaded for ${trimmedCity}.`);
          renderJsonPreview(weatherData, jsonPreview);
        } catch (error) {
          console.error(error);
          cityName.textContent = 'Unable to load weather';
          summary.textContent = 'Please check your connection or try another city.';
          setStatus(error.message || 'Something went wrong.', true);
        }
      }

      searchBtn.addEventListener('click', () => getWeather(cityInput.value));
      cityInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          getWeather(cityInput.value);
        }
      });

      getWeather(cityInput.value);
    </script>
  </body>
</html>
